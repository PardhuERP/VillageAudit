<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report Navigator</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header>

<h1>📊 Report Navigator</h1>

</header>

<div class="card">

<label>Financial Year</label>

<select id="year">

<option value="2025-2026">2025-2026</option>
<option value="2024-2025">2024-2025</option>
<option value="2023-2024">2023-2024</option>
<option value="2022-2023">2022-2023</option>

</select>

<br><br>

<label>State</label>

<select id="state">

<option>Loading...</option>

</select>

<br><br>

<label>District</label>

<select id="district">

<option>Select State First</option>

</select>

<br><br>

<label>Sub District</label>

<select id="subdistrict">

<option>Select District First</option>

</select>

<br><br>

<label>Village</label>

<select id="village">

<option>Select Sub District First</option>

</select>

<br><br>

<label>Report Type</label>

<select id="report">

<option value="financialProgressReport">Financial Progress</option>

<option value="voucherWiseReport">Voucher Wise</option>

<option value="paymentVoucherDetail">Payment Voucher</option>

<option value="receiptVoucherDetail">Receipt Voucher</option>

<option value="cashBookReport">Cash Book</option>

<option value="assetRegisterReport">Asset Register</option>

</select>

<br><br>

<button onclick="openReport()">

🚀 Open Report

</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycby2PHdv3C9YFmZZ7akKazW5aqPX337oxcBwgVD65NpGC_5bUMSnLttaCmqSds0d6Yv_Eg/exec";

async function loadStates(){

const res=await fetch(API+"?action=getStates");

const json=await res.json();

const state=document.getElementById("state");

state.innerHTML="<option value=''>Select State</option>";

json.data.forEach(function(s){

state.innerHTML+=
`<option value="${s.code}">${s.name}</option>`;

});

}

function openReport(){

alert("Next Sprint: Dynamic Report URL");

}

window.onload=loadStates;

</script>

</body>

</html>
