<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report Navigator</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header>

<h1>📊 Report Navigator</h1>

</header>

<!-- ========================================= -->
<!-- REPORT FILTERS -->
<!-- ========================================= -->

<div class="card">

<h2>Report Filters</h2>

<label>Financial Year</label>

<select id="year">

<option value="2025-2026">2025-2026</option>
<option value="2024-2025">2024-2025</option>
<option value="2023-2024">2023-2024</option>
<option value="2022-2023">2022-2023</option>

</select>

<br><br>

<label>State</label>

<select id="state">

<option>Loading...</option>

</select>

<br><br>

<label>District</label>

<select id="district">

<option>Select State First</option>

</select>

<br><br>

<label>Sub District</label>

<select id="subdistrict">

<option>Select District First</option>

</select>

<br><br>

<label>Village</label>

<select id="village">

<option>Select Sub District First</option>

</select>

<br><br>

<label>Report Type</label>

<select id="report">

<option>Loading...</option>

</select>

</div>

<!-- ========================================= -->
<!-- SELECTED DETAILS -->
<!-- ========================================= -->

<div class="card">

<h2>Selected Details</h2>

<p><b>Financial Year :</b> <span id="selectedYear">-</span></p>

<p><b>State :</b> <span id="selectedState">-</span></p>

<p><b>District :</b> <span id="selectedDistrict">-</span></p>

<p><b>Sub District :</b> <span id="selectedSubDistrict">-</span></p>

<p><b>Village :</b> <span id="selectedVillage">-</span></p>

</div>

<!-- ========================================= -->
<!-- REPORT STATUS -->
<!-- ========================================= -->


  <div class="card">

<h2>Report Status</h2>

<p id="reportStatus">

🔴 Complete all selections

</p>

</div>

<!-- ========================================= -->
<!-- GENERATED URL -->
<!-- ========================================= -->

<div class="card">

<h2>Generated Report URL</h2>

<textarea
id="generatedUrl"
rows="6"
style="width:100%;"
readonly>
</textarea>

<br><br>

<button onclick="copyUrl()">

📋 Copy URL

</button>

<button onclick="openReport()">

🚀 Open Report

</button>

</div>

<!-- ========================================= -->
<!-- JAVASCRIPT -->
<!-- ========================================= -->

<script src="../js/report.js"></script>

</body>

</html>
