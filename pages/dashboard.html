<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Village Audit Dashboard</title>
</head>

<body>

  <h1>Village Audit Dashboard</h1>

  <h2 id="village">Loading...</h2>

  <p>
    <span id="block">Loading...</span> |
    <span id="district">Loading...</span>
  </p>

  <hr>

  <h3>Finance Module</h3>

  <script src="../js/api.js"></script>



<script>
async function load() {
    try {
        const config = await getConfig();
        console.log(config);

        document.getElementById("village").innerText = config["Village"];
        document.getElementById("block").innerText = config["Block"];
        document.getElementById("district").innerText = config["District"];

    } catch (err) {
        alert(err);
        console.error(err);
    }
}

load();
</script>

</body>

</html>
